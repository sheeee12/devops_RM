events {}
http {
    upstream my_app {
        # On liste nos deux réplicas de l appli
       # max_fails=1 : une seule erreur suffit à l exclure
        # fail_timeout=10s : on le laisse de côté pendant 10s avant de retester
        server app_rembourse_1:80 max_fails=1 fail_timeout=10s;
        server app_rembourse_2:80 max_fails=1 fail_timeout=10s;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://my_app; # Nginx envoie le trafic vers les réplicas
             # --- RÉGLAGES DE VITESSE ---
            proxy_connect_timeout 2s; # N attend pas plus de 2s pour se connecter
            proxy_read_timeout 2s;    # N attend pas plus de 2s pour lire la réponse
            proxy_next_upstream error timeout http_500; # Passe au suivant si erreur ou timeout
        }
    }
}