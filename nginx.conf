events {
    worker_connections 1024;
}

http {
    # Les noms ici DOIVENT correspondre aux noms de services dans docker-compose.yml
    # Docker Swarm résout ces noms automatiquement via son DNS interne
    upstream my_app {
        server app_rembourse_1:80 max_fails=2 fail_timeout=10s;
        server app_rembourse_2:80 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 80;

        # Health check pour que le prof puisse tester la disponibilité
        location /health {
            return 200 "OK - RembourseMaroc en ligne\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://my_app;

            # En-têtes pour que PHP connaisse la vraie IP du client
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts : si un réplica ne répond pas, on passe à l'autre
            proxy_connect_timeout 3s;
            proxy_read_timeout    10s;
            proxy_next_upstream   error timeout http_500 http_502 http_503;
        }
    }
}