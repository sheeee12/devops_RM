version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    privileged: true
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ./jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      restart_policy:
        condition: any

  sonarqube:
    image: sonarqube:lts-community
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    deploy:
      restart_policy:
        condition: any

  # --- PRODUCTION (REDONDANCE) ---
  app_rembourse_1:
    image: mon-app-php:latest
    build: .
    volumes:
      - shared_sessions:/tmp
    environment:
      - TZ=Africa/Casablanca
    networks: [ "devops-net" ]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  app_rembourse_2:
    image: mon-app-php:latest
    build: .
    volumes:
      - shared_sessions:/tmp
    networks: [ "devops-net" ]
    environment:
      - TZ=Africa/Casablanca
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # --- BASE DE DONNÉES ---
  db_rembourse:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rembourse_maroc
    volumes:
      - db_data:/var/lib/mysql
      - ./config/sql/01_create_database_complete.sql:/docker-entrypoint-initdb.d/01_create_database_complete.sql
    networks: [ "devops-net" ]
    deploy:
      restart_policy:
        condition: any

  # --- LOAD BALANCER ---
  nginx_lb:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: rembourse-nginx:latest
    ports:
      - "8081:80"
    networks: [ "devops-net" ]
    deploy:
      restart_policy:
        condition: any

networks:
  devops-net:

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  db_data:
  shared_sessions:
