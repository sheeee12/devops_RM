version: '3.8'

services:
  # 1. On garde Jenkins, mais on lui donne un nom fixe
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins # <--- AJOUT : C'est son nom sur le réseau Docker
    ports:
      - "8080:8080"
    volumes:
      - ./jenkins_data:/var/jenkins_home

  # 2. On change "auditeur_sonarqube" en "sonarqube" tout court
  sonarqube:
    # <--- CHANGEMENT : Pour que l'URL http://sonarqube:9000 fonctionne
    image: sonarqube:lts-community
    container_name: sonarqube # <--- AJOUT : C'est son identité officielle
    ports:
      - "9000:9000"
