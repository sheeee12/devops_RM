version: '3.8'
services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ./jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    volumes:
      # <--- ON AJOUTE LA MÉMOIRE ICI AUSSI !
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  # --- PRODUCTION (REDONDANCE) ---
  app_rembourse_1:
    build: .
    restart: always
    networks: [ "devops-net" ]

  app_rembourse_2:
    build: .
    restart: always
    networks: [ "devops-net" ]

  # --- BASE DE DONNÉES ---
  db_rembourse:
    image: mysql:8.0
    container_name: db_rembourse
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rembourse_maroc
    volumes: [ "db_data:/var/lib/mysql" ]
    networks: [ "devops-net" ]
  # --- LOAD BALANCER ---
nginx_lb:
  build:
    context: .
    dockerfile: Dockerfile.nginx # On utilise notre nouveau plan
  container_name: nginx_lb
  restart: always
  ports: [ "8081:80" ]
  networks: [ "devops-net" ]
  depends_on: [ app_rembourse_1, app_rembourse_2 ]

networks:
  devops-net:

volumes:
  # On déclare les coffres-forts
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  db_data:

