# =========================================================
# CONFIGURATION DES HOTES
# =========================================================

define host {
    use                     linux-server
    host_name               nginx_lb
    alias                   Nginx Load Balancer
    address                 nginx_lb
    check_command           check_tcp!80
}

define host {
    use                     linux-server
    host_name               app_rembourse_1
    alias                   PHP Engine 1
    address                 app_rembourse_1
    check_command           check_tcp!9000
}

define host {
    use                     linux-server
    host_name               app_rembourse_2
    alias                   PHP Engine 2
    address                 app_rembourse_2
    check_command           check_tcp!9000
}

define host {
    use                     linux-server
    host_name               database_server
    alias                   MySQL Database
    address                 db_rembourse
    check_command           check_tcp!3306
}

# =========================================================
# CONFIGURATION DES GROUPES
# =========================================================

define hostgroup {
    hostgroup_name          rembourse-maroc-stack
    alias                   Supervision Rembourse Maroc
    members                 nginx_lb,app_rembourse_1,app_rembourse_2,database_server
}

# =========================================================
# SUPERVISION DES SERVICES
# =========================================================

# 1. Santé Web (CORRIGÉ : Pas de parenthèses)
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Sante Applicative
    check_command           check_http!-u /health.php -s "OK"
}

# 2. Base de données
define service {
    use                     generic-service
    host_name               database_server
    service_description     Etat du Port MySQL
    check_command           check_tcp!3306
}

# 3. CPU (CORRIGÉ : Utilisation de check_local_load)
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Consommation CPU
    check_command           check_local_load!5.0,4.0,3.0!10.0,6.0,4.0
}

# 4. Disque (CORRIGÉ : Utilisation de check_local_disk)
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Espace Disque
    check_command           check_local_disk!20%!10%!/
}

# 5. Processus (CORRIGÉ : Utilisation de check_local_procs)
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Nombre de Processus
    check_command           check_local_procs!250!400!RSZDT
}