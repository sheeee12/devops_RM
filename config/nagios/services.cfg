# DÉFINITION DE L'HOST LOCALHOST (Obligatoire pour Nagios)
define host {
    use                     linux-server
    host_name               localhost
    alias                   Nagios Server
    address                 127.0.0.1
}

# DÉFINITION DE L'APPLICATION PHP
define host {
    use                     linux-server
    host_name               app_rembourse
    alias                   Application PHP
    # NOM COMPLET SWARM : nomstack_nomservice
    address                 ma_gestion_app_rembourse_1  
    check_command           check_ping!100.0,20%!500.0,60%
}

# DÉFINITION DU LOAD BALANCER NGINX
define host {
    use                     linux-server
    host_name               nginx_lb
    alias                   Nginx Load Balancer
    address                 ma_gestion_nginx_lb
    check_command           check_ping!100.0,20%!500.0,60%
}

# SERVICE : Vérifier la page de santé
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Health Check Application
    check_command           check_http!-p 80 -u /health.php
}

# SERVICE : Vérifier la base de données (via l'app)
define service {
    use                     generic-service
    host_name               app_rembourse
    service_description     MySQL Database Link
    check_command           check_tcp!3306
}