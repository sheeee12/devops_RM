# =========================================================
# CONFIGURATION DES HOTES (LES SERVEURS)
# =========================================================

# Le Load Balancer Nginx
define host {
    use                     linux-server
    host_name               nginx_lb
    alias                   Nginx Load Balancer
    address                 ma_gestion_nginx_lb
    check_command           check_tcp!80
}

# Instance PHP n°1
define host {
    use                     linux-server
    host_name               app_rembourse_1
    alias                   PHP Engine 1
    address                 ma_gestion_app_rembourse_1
    check_command           check_tcp!9000
}

# Instance PHP n°2
define host {
    use                     linux-server
    host_name               app_rembourse_2
    alias                   PHP Engine 2
    address                 ma_gestion_app_rembourse_2
    check_command           check_tcp!9000
}

# Serveur de Base de Données
define host {
    use                     linux-server
    host_name               database_server
    alias                   MySQL Database
    address                 ma_gestion_db_rembourse
    check_command           check_tcp!3306
}

# =========================================================
# CONFIGURATION DES GROUPES (POUR L'INTERFACE)
# =========================================================

define hostgroup {
    hostgroup_name          rembourse-maroc-stack
    alias                   Supervision Rembourse Maroc
    members                 nginx_lb,app_rembourse_1,app_rembourse_2,database_server
}

# =========================================================
# SUPERVISION DES SERVICES (LES ETATS)
# =========================================================

# 1. Vérification de la Santé Applicative (Le site est-il fonctionnel ?)
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Sante Applicative (health.php)
    check_command           check_http!-p 80 -u /health.php -s "OK"
    check_interval          1
}

# 2. Vérification de la Base de Données (Port MySQL)
define service {
    use                     generic-service
    host_name               database_server
    service_description     Etat du Port MySQL
    check_command           check_tcp!3306
    check_interval          1
}

# 3. Supervision des ressources : Charge CPU
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Consommation CPU
    check_command           check_load!5.0,4.0,3.0!10.0,6.0,4.0
}

# 4. Supervision des ressources : Espace Disque
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Espace Disque
    check_command           check_disk!20%!10%!/
}

# 5. Supervision des ressources : Processus actifs (RAM/Moteur)
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Nombre de Processus
    check_command           check_procs!250!400!RSZDT
}