# 1. Définition de App 1
define host {
    use                     generic-host            
    host_name               App_Rembourse_1
    address                 app_rembourse_1
    check_command           check-host-alive
}

# 2. Définition de App 2
define host {
    use                     generic-host
    host_name               App_Rembourse_2
    address                 app_rembourse_2
    check_command           check-host-alive
}

# 3. Définition de la Base de Données
define host {
    use                     generic-host
    host_name               MySQL_Database
    address                 db_rembourse
    check_command           check-host-alive
}

# 4. Service pour vérifier que le site répond (Port 80)
define service {
    use                     generic-service
    host_name               App_Rembourse_1
    service_description     HTTP_Check
    check_command           check_http
}