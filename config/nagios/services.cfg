# =========================================================
# 1. LE LOAD BALANCER (L'entrée du site)
# =========================================================
define host {
    use                     linux-server
    host_name               nginx_lb
    alias                   Nginx Load Balancer
    address                 ma_gestion_nginx_lb
    check_command           check_ping!100.0,20%!500.0,60%
}

# =========================================================
# 2. LES RÉPLICAS (Tes deux moteurs PHP)
# =========================================================
define host {
    use                     linux-server
    host_name               app_rembourse_1
    alias                   PHP Instance 1
    address                 ma_gestion_app_rembourse_1
    check_command           check_ping!100.0,20%!500.0,60%
}

define host {
    use                     linux-server
    host_name               app_rembourse_2
    alias                   PHP Instance 2
    address                 ma_gestion_app_rembourse_2
    check_command           check_ping!100.0,20%!500.0,60%
}

# =========================================================
# 3. LA BASE DE DONNÉES
# =========================================================
define host {
    use                     linux-server
    host_name               database_server
    alias                   MySQL Database
    address                 ma_gestion_db_rembourse
    check_command           check_ping!100.0,20%!500.0,60%
}

# =========================================================
# LES SERVICES (Vérification du fonctionnement)
# =========================================================

# Vérifier que le site répond via Nginx
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Disponibilite Site Web
    check_command           check_http!-p 80 -u /health.php
}

# Vérifier que le port MySQL est ouvert
define service {
    use                     generic-service
    host_name               database_server
    service_description     Port MySQL 3306
    check_command           check_tcp!3306
}

# --- AJOUTS POUR LE PROF (CPU, RAM, DISQUE) ---

# Surveillance de la Charge CPU
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Charge CPU
    check_command           check_local_load!5.0,4.0,3.0!10.0,6.0,4.0
}

# Surveillance de l'espace Disque
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Espace Disque
    check_command           check_local_disk!20%!10%!/
}

# Surveillance du nombre de processus (Indicateur RAM)
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Nombre de Processus
    check_command           check_local_procs!250!400!RSZDT
}