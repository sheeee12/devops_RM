# DÉFINITION DE L'HOST LOCALHOST (Obligatoire pour Nagios)
define host {
    use                     linux-server
    host_name               localhost
    alias                   Nagios Server
    address                 127.0.0.1
}

# ---------------------------------------------------------
# RÉPLICA 1
# ---------------------------------------------------------
define host {
    use                     linux-server
    host_name               app_rembourse_1
    alias                   Application PHP - Instance 1
    address                 ma_gestion_app_rembourse_1
    check_command           check_ping!100.0,20%!500.0,60%
}

# ---------------------------------------------------------
# RÉPLICA 2
# ---------------------------------------------------------
define host {
    use                     linux-server
    host_name               app_rembourse_2
    alias                   Application PHP - Instance 2
    address                 ma_gestion_app_rembourse_2
    check_command           check_ping!100.0,20%!500.0,60%
}

# SERVICE : Vérifier la page de santé
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Health Check Application
    check_command           check_http!-p 80 -u /health.php
}

# SERVICE : Vérifier la base de données (via l'app)
define service {
    use                     generic-service
    host_name               app_rembourse
    service_description     MySQL Database Link
    check_command           check_tcp!3306
}