define host {
    use                     linux-server
    host_name               app_rembourse_1
    address                 ma_gestion_app_rembourse_1
    check_command           check_ping!100.0,20%!500.0,60%
}

define host {
    use                     linux-server
    host_name               nginx_lb
    address                 ma_gestion_nginx_lb
    check_command           check_ping!100.0,20%!500.0,60%
}

# AJOUT : Le serveur de base de données
define host {
    use                     linux-server
    host_name               database_server
    address                 ma_gestion_db_rembourse
    check_command           check_ping!100.0,20%!500.0,60%
}

# ==========================================
# LES SERVICES (Les tests)
# ==========================================

# Test du site Web via le Load Balancer
define service {
    use                     generic-service
    host_name               nginx_lb
    service_description     Verification URL Health
    check_command           check_http!-p 80 -u /health.php
}

# Test de la base de données (SUR LE BON SERVEUR)
define service {
    use                     generic-service
    host_name               database_server  # <-- ON CHANGE ICI
    service_description     Etat du port MySQL 3306
    check_command           check_tcp!3306
}